name: validate
on:
  pull_request:
    paths:
      - "measurements/**"
      - "corpus/**"
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate corpus manifest
        run: python3 tools/validate_manifest.py corpus/manifest.jsonl
      - name: Validate measurements
        run: python3 tools/validate_measurements.py .
